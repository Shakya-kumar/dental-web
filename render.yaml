services:
  - type: web
    name: dr-vivek-malviya-healthcare-platform
    runtime: node
    plan: starter
    buildCommand: npm ci && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATABASE_URL
        fromDatabase:
          name: dr-vivek-malviya-postgres
          property: connectionString
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_WHATSAPP_NUMBER
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
databases:
  - name: dr-vivek-malviya-postgres
    plan: starter
    databaseName: healthcare_platform
    user: healthcare_admin
